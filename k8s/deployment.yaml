apiVersion: apps/v1
kind: Deployment
metadata:
  name: greetapi
  labels:
    app: greetapi
spec:
  replicas: 2
  selector:
    matchLabels:
      app: greetapi
  template:
    metadata:
      labels:
        app: greetapi
    spec:
      containers:
        - name: greetapi
          image: IMAGE_PLACEHOLDER
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: greetapi-config
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "250m"
